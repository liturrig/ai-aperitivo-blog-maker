name: Supabase migrations

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-migrations.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry run remote migrations
        run: supabase db push --dry-run --include-all

  deploy:
    name: Apply migrations
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply remote migrations
        run: supabase db push --include-all
