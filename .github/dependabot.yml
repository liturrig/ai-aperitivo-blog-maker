version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    open-pull-requests-limit: 5
    reviewers:
      - "liturrig"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    open-pull-requests-limit: 5
    reviewers:
      - "liturrig"
